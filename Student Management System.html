<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajkot Engineering College - Student Management Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2c3e50;
      --primary-light: #34495e;
      --secondary: #3498db;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
      --dark: #1a1a2e;
      --light: #ecf0f1;
      --white: #ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,0.2);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.3);
    }

    * {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      color: #2c3e50;
    }

    /* Header */
    .app-header {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 1030;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--primary) !important;
    }

    /* Sidebar */
    .sidebar {
      background: linear-gradient(180deg, var(--dark) 0%, var(--primary) 100%);
      width: 260px;
      height: calc(100vh - 70px);
      position: fixed;
      top: 70px;
      left: 0;
      overflow-y: auto;
      transition: all 0.3s ease;
      z-index: 1020;
      box-shadow: var(--shadow);
    }

    .sidebar-nav .nav-link {
      color: rgba(255,255,255,0.8);
      padding: 1rem 1.5rem;
      border-radius: 0 25px 25px 0;
      margin: 0.25rem 0;
      transition: all 0.3s ease;
      position: relative;
      cursor: pointer;
    }

    .sidebar-nav .nav-link:hover,
    .sidebar-nav .nav-link.active {
      background: rgba(255,255,255,0.15);
      color: white;
      transform: translateX(10px);
      box-shadow: 5px 0 20px rgba(255,255,255,0.1);
    }

    /* Main Content */
    .main-content {
      margin-left: 260px;
      margin-top: 70px;
      min-height: calc(100vh - 70px);
      padding: 2rem;
      transition: all 0.3s ease;
    }

    @media (max-width: 992px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.show { transform: translateX(0); }
      .main-content { margin-left: 0; }
    }

    /* Cards & Tables */
    .overview-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255,255,255,0.2);
      position: relative;
      overflow: hidden;
    }
    
    .prof-card {
      background: white;
      border-radius: 15px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      height: 100%;
      border-top: 4px solid var(--secondary);
    }

    .data-table {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .table thead th {
      background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
      border: none;
      font-weight: 600;
      padding: 1.25rem 1rem;
    }
    .table tbody tr {
      transition: all 0.2s ease;
      vertical-align: middle;
      cursor: pointer;
    }
    .table tbody tr:hover {
      background: rgba(52, 152, 219, 0.1);
      transform: scale(1.01);
    }

    .status-badge { padding: 0.5rem 1rem; border-radius: 25px; font-size: 0.875rem; font-weight: 600; }
    .status-active { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    .status-warning { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    .status-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }

    /* Loading Animation */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
  </style>
</head>

    document.addEventListener('DOMContentLoaded', function() {
      initApp();
      loadDashboard();
    });

    function initApp() {
      document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('show'));
      document.addEventListener('click', function(e) {
        if (e.target.closest('.nav-link[data-page], .dropdown-item[data-page], .btn[data-page]')) {
          e.preventDefault();
          loadPage(e.target.closest('[data-page]').dataset.page);
        }
      });
      setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 800);
    }

    function loadPage(pageName) {
      currentPage = pageName;
      const container = document.getElementById('pageContent');
      container.innerHTML = `<div class="d-flex justify-content-center align-items-center min-vh-50"><div class="spinner-border text-primary"></div></div>`;
      
      setTimeout(() => {
        switch(pageName) {
          case 'dashboard': loadDashboard(); break;
          case 'students': loadStudents(); break;
          case 'grades': loadGrades(); break;
          case 'attendance': loadAttendance(); break;
          case 'reports': loadReports(); break;
          case 'settings': loadSettings(); break;
        }
        document.querySelectorAll('.nav-link[data-page]').forEach(link => {
          link.classList.toggle('active', link.dataset.page === pageName);
        });
      }, 300);
    }

    function loadStudents() {
      document.getElementById('pageContent').innerHTML = `
        <div class="mb-4">
          <h2 class="fw-bold">Student Directory</h2>
          <p class="text-muted">Total Enrolled: ${students.length} — <strong class="text-primary">Click on any student row to view full family & contact details.</strong></p>

        <div class="data-table table-responsive p-3">
          <table class="table table-hover">
            <thead>
              <tr><th>Photo</th><th>Roll No</th><th>Name</th><th>Course</th><th>CGPA</th><th>Status</th></tr>
            </thead>
            <tbody>
              ${students.map(s => `
                <tr onclick="showStudentModal('${s.id}')" title="Click to view details">
                  <td><img src="${s.photo}" class="rounded-circle" width="40"></td>
                  <td class="fw-bold">${s.rollNo}</td>
                  <td>${s.name}<br><small class="text-muted">${s.email}</small></td>
                  <td>${s.course}<br><small>${s.batch}</small></td>
                  <td><span class="badge bg-${s.cgpa >= 8.5 ? 'success' : s.cgpa >= 7 ? 'primary' : 'warning'}">${s.cgpa}</span></td>
                  <td><span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></td>

              <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold text-primary" id="modalTitle">Student Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body p-0" id="modalBodyContent">
                </div>
              <div class="modal-footer border-0 bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Function to populate and show the Modal
    window.showStudentModal = function(studentId) {

      document.getElementById('modalTitle').innerText = `${s.name} (${s.rollNo})`;
      
      document.getElementById('modalBodyContent').innerHTML = `
        <div class="text-center p-4" style="background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);">

           <h4 class="fw-bold mb-0">${s.name}</h4>
           <p class="text-muted mb-0">${s.course} • Batch ${s.batch}</p>
        </div>
        <div class="p-4">
          <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">Personal & Contact Info</h6>
          <div class="row mb-2">
            <div class="col-5 text-muted fw-semibold">City:</div>
            <div class="col-7">${s.city}</div>
          </div>
          <div class="row mb-2">
            <div class="col-5 text-muted fw-semibold">Student Phone:</div>
            <div class="col-7">${s.phone}</div>
          </div>
          <div class="row mb-4">
            <div class="col-5 text-muted fw-semibold">Email:</div>
            <div class="col-7 text-truncate" title="${s.email}">${s.email}</div>
          </div>

          <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">Family Information</h6>
          <div class="row mb-2">
            <div class="col-5 text-muted fw-semibold">Father's Name:</div>
            <div class="col-7">${s.fatherName}</div>
          </div>
          <div class="row mb-2">
            <div class="col-5 text-muted fw-semibold">Mother's Name:</div>
            <div class="col-7">${s.motherName}</div>
          </div>
          <div class="row mb-2">
            <div class="col-5 text-muted fw-semibold">Parents' Mobile:</div>
            <div class="col-7"><strong>${s.parentPhone}</strong></div>
          </div>
        </div>
      `;

      // Show modal using Bootstrap JS API
      const detailModal = new bootstrap.Modal(document.getElementById('studentDetailModal'));
      detailModal.show();
    }

    function loadAttendance() {
      document.getElementById('pageContent').innerHTML = `
        <div class="mb-4"><h2 class="fw-bold">Live Attendance Tracking</h2></div>
        <div class="data-table table-responsive p-3">
          <table class="table table-hover align-middle">
            <thead><tr><th>Roll No</th><th>Name</th><th>Course</th><th>Attendance %</th></tr></thead>
            <tbody>
              ${students.map(s => {
                let color = s.attendance >= 85 ? 'success' : s.attendance >= 75 ? 'warning' : 'danger';
                return `<tr>
                  <td class="fw-bold">${s.rollNo}</td><td>${s.name}</td><td>${s.course}</td>
                  <td style="width: 40%;">
                    <div class="d-flex align-items-center">
                      <span class="me-3 fw-bold text-${color}">${s.attendance}%</span>
                      <div class="progress flex-grow-1" style="height: 8px;"><div class="progress-bar bg-${color}" style="width: ${s.attendance}%;"></div></div>
                    </div>
                  </td>
                </tr>`}).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function loadGrades() {
      document.getElementById('pageContent').innerHTML = `
        <div class="mb-4"><h2 class="fw-bold">Academic Grades</h2></div>
        <div class="row g-4">
          ${students.map(s => `
            <div class="col-md-6 col-xl-4">
              <div class="overview-card p-3">
                <div class="d-flex align-items-center mb-3">
                  <img src="${s.photo}" class="rounded-circle me-3" width="50">
                  <div><h5 class="mb-0 fw-bold">${s.name}</h5><small class="text-muted">${s.rollNo}</small></div>
                </div>
                <div class="row text-center border-top pt-3">
                  <div class="col-6 border-end"><p class="mb-0 text-muted small">SGPA</p><h4 class="fw-bold text-primary">${s.sgpa}</h4></div>
                  <div class="col-6"><p class="mb-0 text-muted small">CGPA</p><h4 class="fw-bold text-${s.cgpa >= 8.5 ? 'success' : s.cgpa >= 7 ? 'primary' : 'warning'}">${s.cgpa}</h4></div>
                </div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    function loadReports() {
      const reported = students.filter(s => s.behavior.length > 0);
      document.getElementById('pageContent').innerHTML = `
        <div class="mb-4"><h2 class="fw-bold text-danger"><i class="bi bi-shield-exclamation me-2"></i>Discipline Reports</h2></div>
        <div class="data-table table-responsive p-3">
          <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th>Date</th><th>Student</th><th>Incident</th><th>Action Taken</th></tr></thead>
            <tbody>
              ${reported.length === 0 ? `<tr><td colspan="4" class="text-center py-4">No disciplinary records found.</td></tr>` : 
                reported.map(s => s.behavior.map(b => `
                  <tr>
                    <td><span class="badge bg-light text-dark border">${b.date}</span></td>
                    <td><div class="fw-bold text-danger">${s.name}</div><small class="text-muted">${s.rollNo}</small></td>
                    <td>${b.incident}</td><td><strong>${b.action}</strong></td>
                  </tr>`).join('')).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function loadSettings() {
      document.getElementById('pageContent').innerHTML = `
        <div class="mb-4"><h2 class="fw-bold">Settings</h2></div>
        <div class="overview-card p-4">
          <p>System configurations are locked to read-only for standard faculty accounts.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
